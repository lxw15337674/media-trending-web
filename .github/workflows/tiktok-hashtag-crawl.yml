name: TikTok Hashtag Crawl

on:
  schedule:
    - cron: '45 */6 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tiktok-hashtag-crawl
  cancel-in-progress: false

jobs:
  crawl-tiktok-hashtag:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      TZ: Asia/Shanghai
      TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
      TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
      TIKTOK_TREND_LOCALE: en
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v2

      - name: Resolve Chrome path
        shell: bash
        run: |
          CHROME_PATH="$(which google-chrome || which google-chrome-stable || which chrome || true)"
          if [ -z "$CHROME_PATH" ]; then
            echo "Chrome executable not found in PATH" >&2
            exit 1
          fi
          echo "TIKTOK_TREND_BROWSER_EXECUTABLE_PATH=$CHROME_PATH" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply database migrations
        run: pnpm db:migrate

      - name: Crawl TikTok hashtag trends
        run: pnpm crawl:tiktok:hashtag -- --timeout-ms=60000 --wait-after-load-ms=1500
