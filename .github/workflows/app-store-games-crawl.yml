name: App Store Games Crawl

on:
  schedule:
    - cron: '35 */6 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: app-store-games-crawl
  cancel-in-progress: false

jobs:
  crawl-app-store-games:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TZ: Asia/Shanghai
      TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
      TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Crawl App Store game charts
        run: pnpm crawl:app-store:games
