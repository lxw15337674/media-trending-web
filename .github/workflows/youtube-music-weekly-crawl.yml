name: YouTube Music Weekly Crawl

on:
  schedule:
    - cron: '35 2,8,14,20 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: youtube-music-weekly-crawl
  cancel-in-progress: false

jobs:
  crawl-youtube-music:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TZ: Asia/Shanghai
      TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
      TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
      YOUTUBE_MUSIC_WEEKLY_COUNTRY_CODES: global,US,JP,IN,BR,MX,GB,DE,KR,ID,FR
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Crawl YouTube Music weekly chart
        run: pnpm crawl:youtube:music:weekly
