name: YouTube Music Shorts Daily Crawl

on:
  schedule:
    - cron: '35 4,10,16,22 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: youtube-music-shorts-daily-crawl
  cancel-in-progress: false

jobs:
  crawl-youtube-music-shorts-daily:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      TZ: Asia/Shanghai
      TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
      TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
      YOUTUBE_MUSIC_DAILY_SHORTS_COUNTRY_CODES: global,US,JP
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Crawl YouTube Music shorts daily chart
        run: pnpm crawl:youtube:music:shorts:daily
