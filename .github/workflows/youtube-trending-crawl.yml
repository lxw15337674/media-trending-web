name:  YouTube Trending Crawl

on:
  schedule:
    - cron: '5 */6 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: youtube-trending-crawl-sixhourly
  cancel-in-progress: false

jobs:
  crawl-sixhourly:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TZ: Asia/Shanghai
      TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
      TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
      YOUTUBE_API_KEY_DAILY: ${{ secrets.YOUTUBE_API_KEY_DAILY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile


      - name: Crawl YouTube trending snapshots
        run: pnpm crawl:youtube:trending --no-retry --max-results=100

