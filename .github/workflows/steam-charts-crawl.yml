name: Steam Charts Crawl

on:
  schedule:
    - cron: '15 */2 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: steam-charts-crawl
  cancel-in-progress: false

jobs:
  crawl-steam-charts:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TZ: Asia/Shanghai
      TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
      TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Crawl Steam charts
        run: pnpm crawl:steam:charts
